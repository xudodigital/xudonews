<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="theme-color" content="#0f0f0f">
        <title>Browse News - XUDONews</title>
        <meta name="robots" content="noindex, nofollow">
        <link rel="canonical" href="https://xudonews.us/">
        <link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
        <link rel="icon" href="icon.svg" type="image/svg+xml">
    </head>
    <body>
        <header class="movie-header">
            <a href="index.html" class="logo" aria-label="XUDONews Home">XUDO<span>NEWS</span>
            </a>
            <nav class="nav-links" id="nav-menu">
                <div class="search-wrapper">
                    <input type="text" id="search-input" class="search-input" placeholder="Search news headlines..." onkeypress="handleEnter(event)" oninput="toggleClearButton()">
                    <button id="clear-btn" class="search-clear" onclick="clearSearch()">✕</button>
                    <button class="search-btn" onclick="executeSearch()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                </div>
                <a href="browse.html?type=favorites" class="header-fav-btn" aria-label="Saved Articles">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z" />
                    </svg>
                </a>
            </nav>
        </header>
        <div class="media-grid-container">
            <h2 class="page-title" id="page-title">Loading...</h2>
            <div id="genre-list" class="genre-scroll"></div>
            <div class="media-grid" id="browse-grid"></div>
            <div class="load-more-container">
                <button id="load-more-btn" class="load-more-btn">Load More</button>
            </div>
        </div>
        <div id="global-footer-placeholder"></div>
        <script src="https://xudotrailer.us/js/global-footer.js"></script>
        <script src="js/main.js"></script>
    </body>
</html>
