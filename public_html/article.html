<html lang="en">

    <meta charset="UTF-8">

    <title>Read Article - XUDONews</title>
    <meta name="description" content="Read the latest breaking news and in-depth analysis on XUDONews.">
    <meta name="robots" content="index, follow"> 
    <link rel="canonical" href="https://xudonews.us/">
    
    <link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    
    <style>
        .article-container { max-width: 900px; margin: 120px auto 50px; padding: 0 4%; }
        .article-title { font-size: 2.5rem; margin-bottom: 15px; line-height: 1.3; color: #fff; }
        .article-meta { display: flex; gap: 20px; color: #aaa; font-size: 0.95rem; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .article-meta span { display: flex; align-items: center; gap: 5px; }
        .article-image-container { width: 100%; max-height: 500px; overflow: hidden; border-radius: 8px; margin-bottom: 30px; background: #222; }
        .article-image-container img { width: 100%; height: 100%; object-fit: cover; }
        .article-content { font-size: 1.15rem; line-height: 1.8; color: #ddd; margin-bottom: 40px; }
        .source-btn { background: #e50914; color: #fff; padding: 12px 25px; border-radius: 50px; text-decoration: none; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; flex: 1; justify-content: center; }
        .source-btn:hover { background: #b2070f; transform: scale(1.02); }
    </style>
</head>
<body>
    <header class="movie-header">
        <a href="index.html" class="logo" aria-label="XUDONews Home">XUDO<span>NEWS</span></a>
        
        <nav class="nav-links" id="nav-menu">
            <div class="search-wrapper">
                <input type="text" id="search-input" class="search-input" placeholder="Search news headlines..." onkeypress="handleEnter(event)" oninput="toggleClearButton()">
                <button id="clear-btn" class="search-clear" onclick="clearSearch()">✕</button>
                <button class="search-btn" onclick="executeSearch()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
            
            <a href="browse.html?type=saved" class="header-fav-btn" aria-label="Saved Articles">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
                </svg>
            </a>
        </nav>
    </header>

    <main class="article-container">
        <h1 id="detail-title" class="article-title">Fetching Headline...</h1>
        
        <div class="article-meta">
            <span id="detail-source">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM8 18H6v-2h2v2zm0-4H6v-2h2v2zm0-4H6V8h2v2zm10 8h-8v-2h8v2zm0-4h-8v-2h8v2zm0-4h-8V8h8v2z"/></svg>
                Source: Loading
            </span>
            <span id="detail-date">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
                Date: Loading
            </span>
        </div>

        <div class="article-image-container">
            <img id="detail-image" src="https://via.placeholder.com/900x500/1a1a1a/ffffff?text=Loading+Image" alt="Article Cover Image">
        </div>

        <div id="detail-content" class="article-content">
            Fetching article content and summary...
        </div>

        <div id="action-group" style="display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 60px;">
            <button class="share-btn" onclick="window.shareArticle()" style="background: #222; border: 1px solid #444; color: #fff; padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 8px; transition: 0.3s; text-transform: uppercase;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                </svg> SHARE
            </button>
            
            <a href="#" id="read-full-btn" target="_blank" rel="nofollow noopener" class="source-btn">
                READ FULL ARTICLE <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7zm-2 16H5V5h7V3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7z"/></svg>
            </a>
        </div>

        <div class="recommendations-section">
            <h2 class="section-title" style="border-left: 4px solid #e50914; padding-left: 15px; margin-bottom: 20px;">Related News</h2>
            <div class="horizontal-slider" id="rec-slider">
                </div>
        </div>
    </main>

    <div id="global-footer-placeholder"></div>
    <script src="https://xudotrailer.us/js/global-footer.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
